<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" width="300" height="320">
  <rect width="300" height="320" fill="transparent"/>

  <!-- Shield outline -->
  <polygon points="150,10 275,70 275,195 150,310 25,195 25,70" fill="#1a1a1a"/>
  <!-- Inner shield cutout -->
  <polygon points="150,24 261,76 261,190 150,295 39,190 39,76" fill="#ffffff"/>

  <!-- Top center crest fin -->
  <rect x="143" y="24" width="14" height="44" fill="#1a1a1a"/>

  <!-- Left ear -->
  <rect x="56" y="86" width="36" height="22" rx="2" fill="#1a1a1a"/>
  <rect x="62" y="92" width="24" height="10" fill="#ffffff"/>

  <!-- Right ear -->
  <rect x="208" y="86" width="36" height="22" rx="2" fill="#1a1a1a"/>
  <rect x="214" y="92" width="24" height="10" fill="#ffffff"/>

  <!-- Forehead band -->
  <rect x="56" y="108" width="188" height="14" fill="#1a1a1a"/>

  <!-- Left eye -->
  <rect x="62" y="128" width="70" height="24" rx="2" fill="#1a1a1a"/>
  <rect x="68" y="134" width="58" height="12" fill="#ffffff"/>

  <!-- Right eye -->
  <rect x="168" y="128" width="70" height="24" rx="2" fill="#1a1a1a"/>
  <rect x="174" y="134" width="58" height="12" fill="#ffffff"/>

  <!-- Nose bridge -->
  <rect x="141" y="120" width="18" height="38" rx="2" fill="#1a1a1a"/>

  <!-- Left cheek -->
  <rect x="64" y="158" width="64" height="20" rx="2" fill="#1a1a1a"/>

  <!-- Right cheek -->
  <rect x="172" y="158" width="64" height="20" rx="2" fill="#1a1a1a"/>

  <!-- Mouth housing -->
  <rect x="74" y="184" width="152" height="28" rx="2" fill="#1a1a1a"/>
  <!-- 5 mouth slots -->
  <rect x="82"  y="191" width="20" height="14" fill="#ffffff"/>
  <rect x="109" y="191" width="20" height="14" fill="#ffffff"/>
  <rect x="140" y="191" width="20" height="14" fill="#ffffff"/>
  <rect x="171" y="191" width="20" height="14" fill="#ffffff"/>
  <rect x="198" y="191" width="20" height="14" fill="#ffffff"/>

  <!-- Chin — hexagonal -->
  <polygon points="96,218 204,218 196,238 186,255 114,255 104,238" fill="#1a1a1a"/>
  <!-- Inner cutout -->
  <polygon points="108,224 192,224 186,238 188,248 120,248 114,238" fill="#ffffff"/>

</svg>
