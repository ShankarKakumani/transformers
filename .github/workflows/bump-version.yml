name: Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update plugin.json version
        run: |
          jq --arg v "${{ steps.version.outputs.VERSION }}" '.version = $v' \
            plugins/transformers/.claude-plugin/plugin.json > tmp.json \
            && mv tmp.json plugins/transformers/.claude-plugin/plugin.json

      - name: Update marketplace.json version
        run: |
          jq --arg v "${{ steps.version.outputs.VERSION }}" '.plugins[0].version = $v' \
            .claude-plugin/marketplace.json > tmp.json \
            && mv tmp.json .claude-plugin/marketplace.json

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/transformers/.claude-plugin/plugin.json .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "Version already up to date, skipping commit"
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }}"
            git push origin main
          fi

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          echo "TAG=${PREV:-}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          COMMANDS=$(ls plugins/transformers/commands/*.md 2>/dev/null | wc -l | tr -d ' ')
          AGENTS=$(ls plugins/transformers/agents/*.md 2>/dev/null | wc -l | tr -d ' ')
          SKILLS=$(find plugins/transformers/skills -name "SKILL.md" 2>/dev/null | wc -l | tr -d ' ')

          cat > /tmp/release-notes.md << NOTES
          ## Transformers ${GITHUB_REF_NAME}

          **Plugin Stats:** ${COMMANDS} commands · ${AGENTS} agents · ${SKILLS} skills

          ### Changes
          NOTES

          if [ -n "${{ steps.prev_tag.outputs.TAG }}" ]; then
            git log ${{ steps.prev_tag.outputs.TAG }}..${GITHUB_REF_NAME} --pretty=format:"- %s" --no-merges | grep -v "chore: bump version" >> /tmp/release-notes.md
          else
            git log --pretty=format:"- %s" --no-merges -20 >> /tmp/release-notes.md
          fi

          cat >> /tmp/release-notes.md << 'NOTES'

          ### Install / Update
          ```bash
          # First time
          /plugin marketplace add ShankarKakumani/transformers
          /plugin install transformers@transformers

          # Update existing
          /plugin marketplace update transformers
          claude plugin update transformers@transformers
          ```

          ---
          *"Till all are one."* — Optimus Prime
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Transformers ${{ github.ref_name }}"
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false
